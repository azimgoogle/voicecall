name: family_call
description: "1-to-1 audio calling app for families. WebRTC + Firebase."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.12.1
  firebase_database: ^11.3.4
  flutter_webrtc: ^1.3.1
  shared_preferences: ^2.5.3
  permission_handler: ^11.4.0
  flutter_foreground_task: ^9.2.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
